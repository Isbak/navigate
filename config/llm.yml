# LLM provider configuration for the semantic classification layer.
#
# This phase uses an LLM to *propose* structured knowledge (classifications,
# observations, hypotheses, candidate relationships) from extracted documents.
# Nothing produced here is a fact - every output carries a confidence score and
# starts life with review_status = NEW for a human to approve later.
#
# Choose the active provider with ``provider``. Each provider has its own block
# so adding a new one later (Azure OpenAI, vLLM, ...) only means
# adding a block here and a small BaseLLMProvider subclass.

provider: claude

ollama:
  model: qwen3:14b
  # Base URL of a running Ollama server.
  host: http://localhost:11434
  # Per-request timeout in seconds.
  timeout: 120

claude:
  model: claude-sonnet-4-5
  # The API key value is read from the named environment variable (or .env),
  # never stored in this file.
  api_key_env: ANTHROPIC_API_KEY
  base_url: https://api.anthropic.com/v1
  anthropic_version: "2023-06-01"
  max_tokens: 4096
  timeout: 120
  # Prompt caching: cache the large, constant classification system prompt so
  # the 2nd+ call within the cache window is billed at the cheaper cache-read
  # rate and skips re-processing ~1k tokens of instructions. Pure win; the
  # savings show up in the cache_read/cache_write columns of the cost ledger.
  prompt_cache: true

openai:
  model: gpt-5.5
  # The API key value is read from the named environment variable (or .env),
  # never stored in this file.
  api_key_env: OPENAI_API_KEY
  base_url: https://api.openai.com/v1
  timeout: 120

# Size of one chunk sent to the model. Long documents are split into chunks of
# this many characters and classified chunk by chunk, then merged - so equations
# and content beyond the head of the document are no longer lost.
max_input_chars: 12000
# Characters of overlap between consecutive chunks, so an equation or sentence
# straddling a boundary is still seen whole by at least one chunk.
chunk_overlap: 500
# Hard cap on how many chunks are processed per document (bounds cost on very
# long files). Remaining text beyond this many chunks is skipped.
max_chunks: 20

# Adaptive model routing (see docs/llm-optimization.md). A cheap, deterministic
# complexity read picks a fast model for ordinary documents and a deep model for
# complex ones (standards, equations, long/dense files). If the fast model is
# unsure (type_confidence below the threshold), that one document is re-run on
# the deep model - so the strong model is spent only where it earns its cost.
#
# fast_model / deep_model must belong to the active provider above. Set
# enabled: false to classify every document with the single ``model`` instead.
routing:
  enabled: true
  fast_model: claude-haiku-4-5
  deep_model: claude-sonnet-4-5
  # Documents scoring at or above this complexity (0.0-1.0) go straight to deep.
  complexity_threshold: 0.5
  # Re-run on the deep model when a fast-model result's type_confidence is below.
  escalate_below_confidence: 0.6
  # Chunk budget for the fast path; the deep path uses max_chunks above.
  fast_max_chunks: 6
