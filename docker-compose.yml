services:
  api:
    build: .
    # Run as the host user that owns the bind-mounted ./data so the API can
    # WRITE the SQLite index (review/approve actions), not just read it. SQLite
    # needs write access to both the database file and its directory. Defaults to
    # the image's built-in "navigate" user (uid 10001); override to match the
    # owner of ./data, e.g. `NAVIGATE_UID=$(id -u) NAVIGATE_GID=$(id -g) docker
    # compose up -d api`. A mismatch surfaces as "attempt to write a readonly
    # database" (a 500, or a 502 behind a reverse proxy).
    user: "${NAVIGATE_UID:-10001}:${NAVIGATE_GID:-10001}"
    # Publish ONLY to the host loopback so the API is not exposed externally by
    # default (local-first). Change the left-hand address to share it.
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      NAVIGATE_DB: /data/catalog.sqlite
      NAVIGATE_CACHE: /data/cache
      # LLM provider credentials are not baked into the image; forward them from
      # the host (or a .env file Compose reads automatically). Empty defaults so
      # the API still starts when classification/GraphRAG are disabled. Only the
      # provider selected in config/llm.yml needs a key.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      # Share the workspace SQLite index and cache with the container so API
      # and local CLI commands see the same data.
      - ./data:/data
      - ./cache:/data/cache
      # Live-editable configuration and query library (read-only in the container).
      - ./config:/app/config:ro
      - ./queries:/app/queries:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  fuseki:
    image: stain/jena-fuseki:latest
    ports:
      - "127.0.0.1:3030:3030"
    environment:
      ADMIN_PASSWORD: ${FUSEKI_ADMIN_PASSWORD:-change-me}
      FUSEKI_DATASET_1: ${FUSEKI_DATASET:-navigate}
    volumes:
      - fuseki-data:/fuseki
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3030/$/ping"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  fuseki-data:
