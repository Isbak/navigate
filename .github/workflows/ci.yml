name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      # Enforced gate: linting must pass. Formatting is intentionally not gated
      # yet (run `ruff format` locally); see pyproject.toml [tool.ruff].
      - name: Ruff lint
        run: ruff check .

      # Advisory while the existing type-annotation findings are burned down;
      # it reports issues without blocking the build. Promote modules to the
      # gated step below as they are cleaned up.
      - name: Mypy (advisory)
        run: mypy || true

      # Enforced gate for the cleaned-up modules. These are held to the stricter
      # config in pyproject.toml ([[tool.mypy.overrides]]); --follow-imports=silent
      # type-checks against (but does not report errors in) the still-advisory
      # dependencies. Add modules here as they are promoted.
      - name: Mypy (gated modules)
        run: mypy --follow-imports=silent src/catalog/commands src/catalog/api/server.py src/catalog/api/config.py

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run tests with coverage
        run: pytest --cov --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: always() && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      # Deterministic stub mode: no API key or network. Quality thresholds are
      # gated via --check; performance numbers are recorded in the report.
      - name: Run benchmark suite
        run: python -m benchmarks --check --format both --out exports/benchmark.json

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: exports/benchmark.json
